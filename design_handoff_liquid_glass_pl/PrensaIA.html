<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrensaIA — Rediseño PL</title>
<link rel="stylesheet" href="assets/pl-tokens.css">
<style>
  * { -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: #E9E2DC; font-family: var(--font-display); }
  #root { width: 100%; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes pl-spin { to { transform: rotate(360deg); } }
  .pl-spin { animation: pl-spin 0.8s linear infinite; }

  @keyframes pl-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pl-pulse { animation: pl-pulse 1.1s ease-in-out infinite; }

  @keyframes pl-caret { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .pl-caret { animation: pl-caret 1s step-end infinite; }

  @keyframes pl-fade { from { opacity: 0; } to { opacity: 1; } }
  .pl-fade { animation: pl-fade 0.2s ease-out; }

  @keyframes pl-sheet-up { from { transform: translateY(14px); } to { transform: translateY(0); } }
  .pl-sheet { animation: pl-sheet-up 0.28s cubic-bezier(0.32, 0.72, 0, 1) both; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#611029"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="#CBA04A" stroke-width="3"/>
    <text x="50" y="58" font-family="Montserrat, sans-serif" font-size="20" font-weight="900" fill="#fff" text-anchor="middle">PL</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>

</body>
</html>
