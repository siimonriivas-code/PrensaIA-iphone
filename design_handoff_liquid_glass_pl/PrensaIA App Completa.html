<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrensaIA — App completa (Liquid Glass)</title>
<link rel="stylesheet" href="assets/pl-tokens.css">
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #E7DFD8; font-family: var(--font-display); }
  #root { width: 100%; }
  button { font-family: inherit; border: none; background: none; padding: 0; cursor: pointer; color: inherit; }
  input, textarea { font-family: inherit; }
  a { color: #611029; } a:hover { color: #B02A5B; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .lg-scroll { overscroll-behavior: contain; }

  /* ── Material Liquid Glass (simulado — backdrop-filter se desalinea
     dentro del marco escalado del iPhone en Chromium) ── */
  .glass {
    position: relative;
    background: var(--gbg);
    box-shadow: var(--gshadow);
  }
  .glass::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    padding: 1.2px; background: var(--gedge);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }
  .glass::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: radial-gradient(130% 70% at 16% 0%, rgba(255,255,255,0.22), transparent 46%);
    pointer-events: none;
  }

  .press { transition: transform 0.16s ease; }
  .press:active { transform: scale(0.96); }

  @keyframes pl-spin { to { transform: rotate(360deg); } }
  .pl-spin { animation: pl-spin 0.8s linear infinite; }
  @keyframes pl-ring-spin { to { transform: rotate(360deg); } }
  .pl-ring-spin { animation: pl-ring-spin 1.1s linear infinite; transform-origin: center; }
  @keyframes pl-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .pl-pulse { animation: pl-pulse 1.1s ease-in-out infinite; }
  @keyframes pl-caret { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .pl-caret { animation: pl-caret 1s step-end infinite; }
  @keyframes pl-fade { from { opacity: 0; } to { opacity: 1; } }
  .pl-fade { animation: pl-fade 0.2s ease-out; }
  @keyframes lg-wave { 0%,100% { transform: scaleY(0.22); } 50% { transform: scaleY(1); } }
  .lg-wavebar { animation: lg-wave 1.05s ease-in-out infinite; transform-origin: center; }
  @keyframes lg-push { from { transform: translateX(26px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .lg-push { animation: lg-push 0.3s cubic-bezier(0.32,0.72,0,1) both; }
  @keyframes lg-pop { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .lg-pop { animation: lg-pop 0.28s cubic-bezier(0.32,0.72,0,1) both; }
  @keyframes lg-sheet-up { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .lg-sheet-up { animation: lg-sheet-up 0.3s cubic-bezier(0.32,0.72,0,1) both; }

  @media (prefers-reduced-motion: reduce) {
    .lg-push, .lg-pop, .lg-sheet-up, .lg-wavebar, .pl-pulse, .pl-caret { animation-duration: 0.001s; animation-iteration-count: 1; }
  }
</style>
</head>
